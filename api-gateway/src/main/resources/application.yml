server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: interview-service
              uri: lb://INTERVIEW-SERVICE
              predicates:
                - Path=/api/interviews/**,/api/reports/**

            - id: ai-service
              uri: lb://AI-SERVICE
              predicates:
                - Path=/api/ai/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"